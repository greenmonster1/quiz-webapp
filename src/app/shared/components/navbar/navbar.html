<mat-toolbar color="primary" class="navbar">
  <a routerLink="/" class="brand" aria-label="USA Citizenship Quiz — home">
    <span class="brand-flag" aria-hidden="true">🇺🇸</span>
    <span class="brand-name">USA Citizenship Quiz</span>
  </a>
  <span class="spacer"></span>
  <span class="brand-tagline" [class.hidden]="isMobile()">Celebrating 250 Years 🇺🇸</span>
  <button mat-stroked-button class="login-btn" aria-label="Login to save your progress">
    <mat-icon>person</mat-icon>
    @if (!isMobile()) { Login }
  </button>
</mat-toolbar>
